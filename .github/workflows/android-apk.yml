name: Build Android APK

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Restore release keystore
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
      - name: Run tests and build APKs
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :proxycore:testDebugUnitTest :app:testDebugUnitTest :app:assembleDebug :app:assembleRelease --stacktrace

      - name: Verify release APK signature
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          apksigner="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          release_apk="$(find app/build/outputs/apk/release -name '*.apk' -print -quit)"
          test -x "$apksigner"
          test -n "$release_apk"
          "$apksigner" verify --verbose --print-certs "$release_apk"
          apk_sha="$("$apksigner" verify --print-certs "$release_apk" | sed -n 's/^Signer #1 certificate SHA-256 digest: //p')"
          key_sha="$(keytool -list -v -keystore "$ANDROID_KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" | sed -n 's/.*SHA256: //p' | tr -d ':')"
          test "${apk_sha,,}" = "${key_sha,,}"

      - name: Generate dependency report
        run: |
          mkdir -p app/build/reports
          ./gradlew :app:dependencies --configuration debugRuntimeClasspath > app/build/reports/dependencies-debug-runtime.txt

      - name: Upload APKs and dependency report
        uses: actions/upload-artifact@v4
        with:
          name: android-proxy-server-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/reports/dependencies-debug-runtime.txt
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-proxy-server-apks
          path: release-assets

      - name: Validate release version
        id: version
        run: |
          version_name="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle.kts)"
          test -n "$version_name"
          test "v$version_name" = "$GITHUB_REF_NAME"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"

      - name: Prepare release APK
        id: asset
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          source_apk="$(find release-assets -name '*release*.apk' -print -quit)"
          test -n "$source_apk"
          release_apk="android-proxy-server-$VERSION_NAME-release.apk"
          cp "$source_apk" "$release_apk"
          echo "path=$release_apk" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_APK: ${{ steps.asset.outputs.path }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$RELEASE_APK" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$RELEASE_APK" \
              --verify-tag \
              --title "Android Proxy Server $GITHUB_REF_NAME" \
              --generate-notes
          fi
